<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSP | Global Humanity Simulation</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <header>
        <div class="stats-bar">
            <div class="stat">
                <span class="label">Global Flourishing:</span>
                <span id="qol-score" class="value">10.0%</span>
            </div>
            <div class="progress-container">
                <div id="qol-progress" class="progress-fill"></div>
            </div>
            <div class="stat">
                <span class="label">Target:</span>
                <span class="value">90.0%</span>
            </div>
        </div>
    </header>

    <nav>
        <button onclick="switchTab('registry')" class="nav-btn active">Problem Registry</button>
        <button onclick="switchTab('graph')" class="nav-btn">Causal Graph</button>
        <button onclick="switchTab('utopia')" class="nav-btn">Utopia Simulator</button>
    </nav>

    <main id="app-content">
        <section id="registry-tab">
            <div class="filter-bar">
                <select id="round-filter" onchange="loadProblems()">
                    <option value="all">All Rounds (1-20)</option>
                    <option value="1">Round 1: Baseline</option>
                    <option value="20">Round 20: Synthesis</option>
                    </select>
                <input type="text" id="search" placeholder="Search problems..." oninput="filterResults()">
            </div>
            <div id="problem-list" class="grid">
                </div>
        </section>
    </main>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
